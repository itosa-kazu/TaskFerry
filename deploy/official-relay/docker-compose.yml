services:
  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        TARGET: relay
    environment:
      TASKFERRY_RELAY_ADDR: ":8080"
      TASKFERRY_RELAY_DB: "/data/relay.db"
      TASKFERRY_RELAY_CLIENT_TOKENS: "${TASKFERRY_RELAY_CLIENT_TOKENS:?set client_id=token mappings}"
      TASKFERRY_OPS_TOKEN: "${TASKFERRY_OPS_TOKEN:-}"
      TASKFERRY_SIGNUP_ENABLED: "${TASKFERRY_SIGNUP_ENABLED:-true}"
      TASKFERRY_SIGNUP_LIMIT_PER_HOUR: "${TASKFERRY_SIGNUP_LIMIT_PER_HOUR:-5}"
    user: "65532:65532"
    ports:
      - "127.0.0.1:${TASKFERRY_RELAY_PORT:-18080}:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
